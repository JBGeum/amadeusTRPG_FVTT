<div class="amadeus-chat chatcard gift-chatcard">
  <div class="chat-inner">
    <header class="chat-title">
      <i class="fa-solid fa-wand-magic-sparkles chat-title-icon"></i>
      <span class="chat-title-text">{{name}}</span>
    </header>
    <div class="chat-ornament" aria-hidden="true">
      <span class="chat-ornament-line chat-ornament-line--l"></span>
      <i class="fa-solid fa-diamond chat-ornament-dot"></i>
      <i class="fa-solid fa-flask-vial chat-ornament-icon"></i>
      <i class="fa-solid fa-diamond chat-ornament-dot"></i>
      <span class="chat-ornament-line chat-ornament-line--r"></span>
    </div>
    <div class="chat-chips">
      <div class="chat-chip">
        <span class="chat-chip-lbl">분류</span>
        <span class="chat-chip-val">{{type}}</span>
      </div>
      <div class="chat-chip">
        <span class="chat-chip-lbl">조건</span>
        <span class="chat-chip-val">{{requirement}}</span>
      </div>
      <div class="chat-chip">
        <span class="chat-chip-lbl">판정</span>
        <span class="chat-chip-val"><a class="gift-abl-roll">{{roll}}</a></span>
      </div>
    </div>
    <div class="chat-body">
      <div class="chat-effect">{{{effect}}}</div>
      <div class="chat-tag">
        <span class="chat-tag-lbl">{{localize 'AMADEUS.gift.tag'}}</span>
        <span class="chat-tag-val">{{tag}}</span>
      </div>
    </div>
  </div>
</div>
